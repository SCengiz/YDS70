name: YDS70
options:
  bundleIdPrefix: com.soraycengiz
  deploymentTarget:
    iOS: "17.0"
targets:
  YDS70:
    type: application
    platform: iOS
    sources:
      - path: YDS70
    info:
      path: YDS70/Info.plist
      properties:
        CFBundleDisplayName: YDS70
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soraycengiz.YDS70
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: CQZBRVT8JN
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  YDS70:
    build:
      targets:
        YDS70: all
    run:
      config: Debug
    archive:
      config: Release
